<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="output.css" rel="stylesheet">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body class="bg-white">
  <nav class="p-6 lg:bg-white bg-gray-200 lg:flex lg:items-center lg:justify-between">
    <div class="flex relative z-[2] justify-between items-center">
      <span>
        <img src="img/abel2.png" alt="" class="h-10 ml-3 select-none">
      </span>

      <span class="text-3xl pr-2 cursor-pointer lg:hidden block">
        <ion-icon name="filter" onclick="Menu(this)"></ion-icon>
      </span>
    </div>

    <ul class="lg:flex z-[1] lg:items-center lg:z-auto lg:static absolute lg:bg-white bg-gray-200 w-full left-0 lg:w-auto lg:py-0 py-5 lg:pl-0 lg:opacity-100 text-center opacity-0 top-[-400px] transition-all ease-in duration-500 select-none">
      <li class="mx-4 my-5 lg:my-0">
        <a href="#" class="text-2xl lg:text-xl text-space-cadet hover:text-cornell-red duration-500">Home</a>
      </li>
      <li class="mx-4 my-5 lg:my-0">
        <a href="#" class="text-2xl lg:text-xl text-space-cadet hover:text-cornell-red duration-500">About me</a>
      </li>
      <li class="mx-4 my-5 lg:my-0">
        <a href="#" class="text-2xl lg:text-xl text-space-cadet hover:text-cornell-red duration-500">Projects</a>
      </li>
      <li class="mx-4 my-5 lg:my-0">
        <a href="#" class="text-2xl lg:text-xl text-space-cadet hover:text-cornell-red duration-500">Contact</a>
      </li>
    </ul>
  </nav>

  <div class="lg:mx-16 lg:bg-gray-200 lg:rounded-t-3xl">
    <div class="px-8 py-12 max-w-md">
      <h1 class="px-8 py-12 text-3xl font-bold text-space-cadet border-2 border-black">
        Hi, <br> I'm Abel
      </h1>
    </div>
  </div>

  <script>
    function Menu(e){
      let list = document.querySelector('ul');

      e.name === "filter" ? (e.name = "close", list.classList.add('top-[75px]'), list.classList.add('opacity-100')) : (e.name = "filter", list.classList.remove('top-[75px]'), list.classList.remove('opacity-100'))
    }
  </script>
</body>
</html>
